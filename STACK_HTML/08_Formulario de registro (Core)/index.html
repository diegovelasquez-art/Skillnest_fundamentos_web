<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
</head>

<body>
    <h1>Crear una cuenta en Discord</h1>
    <form action="#" method="post">
        <div>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre">
        </div>
        <br>
        <div>
            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" name="apellido">
        </div>
        <br>
        <div>
            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" name="email">
        </div>
        <br>
        <div>
            <label for="contraseña">Contraseña:</label>
            <input type="password" id="contraseña" name="contraseña">
        </div>
        <br>
        <div>
            <label for="confirm_password">Confirmar contraseña:</label>
            <input type="password" id="confirm_password" name="confirm_password">
        </div>
        <br>
        <div>
            <label for="fecha_nacimiento">Fecha de nacimiento:</label>
            <input type="date" id="fecha_nacimiento" name="fecha_nacimiento">
        </div>
        <br>
        <div>
            <label>Genero:</label>
                <input type="radio" id="masculino" name="genero" value="masculino">
            <label>Masculino:</label>
                <input type="radio" id="femenino" name="genero" value="femenino">
                <label>Femenino:</label>
            <label>
                <input type="radio" id="Prefiero_no_decirlo" name="genero" value="Prefiero no decirlo">
                Prefiero no decirlo
            </label>
        </div>
        <br>
        <label>Descripción sobre ti</label><br>
        <textarea name="descripcion" id="descripcion" rows="6" cols="30"></textarea>
        <br>
        <div>
            <label for="bandas">Selecciona tus intereses:</label>
            <select id="bandas" name="bandas">
                <option value="Musica">Musica</option>
                <option value="Peliculas">Peliculas</option>
                <option value="Deportes">Deportes</option>
                <option value="Tecnologia">Tecnologia</option>
            </select>
        </div>
        <br>
        <input type="checkbox" id="terminos" name="terminos">
        <label for="terminos">Al registrarte, aceptas los <a href="https://discord.com/terms" target="_blank">Términos y
                Condiciones</a> de Discord.</label><br><br>
        <input type="submit" id="Registrar" value="Registrar">
    </form>
</body>
