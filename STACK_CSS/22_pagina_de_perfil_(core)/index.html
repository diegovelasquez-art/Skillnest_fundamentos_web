<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Diego Velásquez">
    <title>Pagina de perfil</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <h1>Perfil<span class="blue"></span></h1>
            </div>
            <div class="nav-links">
                <a href="#">Inicio</a>
                <a href="#">Mi perfil</a>
                <a href="#">Conexiones</a>
                <button class="btn">Cerrar sesión</button>
            </div>
        </nav>
    </header>
    <main class="contenedor">
        <div class="izquierda">
            <section class="tarjeta">
                <div class="caja"></div>
                <div class="caja2">
                    <img src="static/images/perfil-de-usuario.webp" alt="perfil">
                    <h1>Jane Doe</h1>
                    <p>Bergen, Noruega</p>
                    <div class="explicacion">
                    <p>Desarrolladora Frontend</p>
                    <p>Conocimientos en HTML, CSS, JavaScript</p>
                    </div>
                    <div class="enlaces">
                        <a href="#">⚙ Editar perfil</a>
                    </div>
                </div>
            </section>
        </div>

        <section class="columna-derecha">
            <div class="tarjeta-conexiones">
                <div class="subtitulo">
                    <h2>Solicitudes de conexión</h2>
                    <button>Ver todas</button>
                </div>
                <div class="row">
                    <div class="contacto">
                        <img src="static/images/perfil-de-usuario.webp" alt="perfil">
                        <p>Steve Jobs</p>
                    </div>
                    <div class="botones">
                        <div class="boton">✅</div>
                        <div class="boton">❌</div>
                    </div>
                </div>
                <div class="row">
                    <div class="contacto">
                        <img src="static/images/perfil-de-usuario.webp" alt="perfil">
                        <p>Bill Gates</p>
                    </div>
                    <div class="botones">
                        <div class="boton">✅</div>
                        <div class="boton">❌</div>
                    </div>
                </div>
            </div>
            <div class="tarjeta-conexiones">
                <div class="subtitulo">
                    <h2>Tus conexiones</h2>
                    <button>Ver todas</button>
                </div>
                <div class="contacto">
                    <img src="static/images/perfil-de-usuario.webp" alt="perfil">
                    <p>Richard Stallman</p>
                </div>
                <div class="contacto">
                    <img src="static/images/perfil-de-usuario.webp" alt="perfil">
                    <p>Linus Torvalds</p>
                </div>
                <div class="contacto">
                    <img src="static/images/perfil-de-usuario.webp" alt="perfil">
                    <p>Ada Lovelace</p>
                </div>
                <div class="contacto">
                    <img src="static/images/perfil-de-usuario.webp" alt="perfil">
                    <p>Grace hopper</p>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
